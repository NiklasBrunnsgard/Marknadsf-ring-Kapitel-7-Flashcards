<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Marknadsföring Kapitel 7</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card-front: #1e1c2e;
    --card-back: #162235;
    --accent: #e8c547;
    --accent2: #5b9cf6;
    --accent3: #f07167;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --phase1: #5b9cf6;
    --phase2: #52b788;
    --phase3: #f07167;
    --neutral: #9b8ecf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(91,156,246,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(232,197,71,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .chapter-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232,197,71,0.3);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* PROGRESS */
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    background: var(--surface);
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 100px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0f0e17; font-weight: 500; }
  .tab[data-filter="fas1"].active { background: var(--phase1); border-color: var(--phase1); }
  .tab[data-filter="fas2"].active { background: var(--phase2); border-color: var(--phase2); }
  .tab[data-filter="fas3"].active { background: var(--phase3); border-color: var(--phase3); }

  /* CARD AREA */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 40px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 640px;
    perspective: 1200px;
    cursor: pointer;
  }

  .card {
    position: relative;
    width: 100%;
    height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }


  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .card-front {
    background: var(--card-front);
    position: relative;
    overflow: hidden;
  }

  .card-front::after {
    content: '';
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }

  /* Category dot on card */
  .card-category {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-weight: 500;
  }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .cat-dot.fas1 { background: var(--phase1); }
  .cat-dot.fas2 { background: var(--phase2); }
  .cat-dot.fas3 { background: var(--phase3); }
  .cat-dot.general { background: var(--neutral); }

  .card-question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
    display: flex;
    align-items: center;
  }

  .flip-hint {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flip-hint svg { opacity: 0.4; }

  .card-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    font-weight: 500;
  }

  .card-answer {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    line-height: 1.7;
    color: #d4d6e8;
    font-weight: 300;
  }

  .card-answer strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Card hover effect */
  .card-wrapper:hover .card:not(.flipped) {
    transform: translateY(-4px);
  }

  .card-wrapper:hover .card.flipped {
    transform: rotateY(180deg) translateY(-4px);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 100px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0e17;
  }

  .btn-primary:hover { background: #f0d060; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-secondary:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-1px); }

  .btn-know {
    background: rgba(82,183,136,0.15);
    color: var(--phase2);
    border: 1px solid rgba(82,183,136,0.3);
  }

  .btn-know:hover { background: rgba(82,183,136,0.25); }

  .btn-review {
    background: rgba(240,113,103,0.15);
    color: var(--phase3);
    border: 1px solid rgba(240,113,103,0.3);
  }

  .btn-review:hover { background: rgba(240,113,103,0.25); }

  /* SCORE display */
  .score-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .score-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-radius: 100px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .score-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .score-chip.known .dot { background: var(--phase2); }
  .score-chip.review .dot { background: var(--phase3); }
  .score-chip.remaining .dot { background: var(--text-muted); }

  /* COMPLETED STATE */
  .completed {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .completed.show { display: block; }

  .completed-icon {
    font-size: 64px;
    margin-bottom: 24px;
  }

  .completed h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 12px;
  }

  .completed p {
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  /* Card counter badge */
  .card-counter {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    font-weight: 500;
  }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-area { animation: slideIn 0.4s ease forwards; }

  /* Responsive */
  @media (max-width: 480px) {
    .card-face { padding: 28px; }
    .controls { gap: 8px; }
    .btn { padding: 10px 20px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="chapter-label">Marknadsföring</div>
    <h1>Kapitel 7<br><span>Flashcards</span></h1>
    <p class="subtitle">Klicka på kortet för att se svaret &nbsp;·&nbsp; Markera vad du kan</p>
  </header>

  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText">0 / 0 klara</span>
  </div>

  <div class="filter-tabs">
    <button class="tab active" data-filter="all">Alla kort</button>
    <button class="tab" data-filter="general">Grundbegrepp</button>
    <button class="tab" data-filter="fas1">Fas 1 – Före köp</button>
    <button class="tab" data-filter="fas2">Fas 2 – Under köp</button>
    <button class="tab" data-filter="fas3">Fas 3 – Efter köp</button>
  </div>

  <div class="score-row" style="margin-bottom: 24px;">
    <div class="score-chip known"><span class="dot"></span><span id="knownCount">0</span> kan</div>
    <div class="score-chip review"><span class="dot"></span><span id="reviewCount">0</span> öva mer</div>
    <div class="score-chip remaining"><span class="dot"></span><span id="remainingCount">0</span> kvar</div>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
      <div class="card" id="mainCard">
        <div class="card-face card-front">
          <span class="card-counter" id="cardCounter">1 / 20</span>
          <div class="card-category">
            <span class="cat-dot" id="catDot"></span>
            <span id="catLabel">Begrepp</span>
          </div>
          <div class="card-question" id="cardQuestion">Laddar...</div>
          <div class="flip-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Klicka för att vända
          </div>
        </div>
        <div class="card-face card-back">
          <span class="card-counter" id="cardCounterBack">1 / 20</span>
          <div class="card-label">SVAR</div>
          <div class="card-answer" id="cardAnswer">Svar här...</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-review" onclick="markCard('review')">✕ Öva mer</button>
      <button class="btn btn-secondary" onclick="nextCard()">Hoppa över →</button>
      <button class="btn btn-know" onclick="markCard('know')">✓ Kan!</button>
    </div>

    <div class="controls" style="margin-top: 4px;">
      <button class="btn btn-secondary" onclick="prevCard()">← Föregående</button>
      <button class="btn btn-primary" onclick="shuffleCards()">⇄ Blanda</button>
    </div>
  </div>

  <div class="completed" id="completedPanel">
    <div class="completed-icon">🎉</div>
    <h2>Alla kort klara!</h2>
    <p id="completedMsg">Du har gått igenom alla kort i detta set.</p>
    <button class="btn btn-primary" onclick="resetAll()">Börja om från början</button>
  </div>

</div>

<script>
const ALL_CARDS = [
  // GRUNDBEGREPP
  {
    category: "general",
    catLabel: "Grundbegrepp",
    question: "Vad är relationsmarknadsföring?",
    answer: "En modell som delar in marknadsföringen i faser baserat på var kunden är i sin resa. Grundidén: det är <strong>billigare att behålla en befintlig kund</strong> än att ständigt jaga nya."
  },
  {
    category: "general",
    catLabel: "Grundbegrepp",
    question: "Vad menas med kundens livstidsvärde?",
    answer: "Det <strong>totala värdet</strong> en kund ger företaget under hela sin tid som kund – inte bara ett enskilt köp. Relationsmarknadsföring fokuserar på detta istället för enstaka transaktioner."
  },
  {
    category: "general",
    catLabel: "Grundbegrepp",
    question: "Vad är de 4 P:na inom marknadsföring?",
    answer: "<strong>Produkt</strong> – rätt produkterbjudande<br><strong>Pris</strong> – rätt pris och köpvillkor<br><strong>Plats</strong> – rätt distributionskanal<br><strong>Påverkan</strong> – rätt kommunikation"
  },
  {
    category: "general",
    catLabel: "Grundbegrepp",
    question: "Nämn de tre faserna i relationsmarknadsföring.",
    answer: "<strong>1. Kontaktskapande fasen</strong> – Före köp<br><strong>2. Kundskapande fasen</strong> – Under köp<br><strong>3. Relationsförstärkande fasen</strong> – Efter köp"
  },
  // FAS 1
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Vad är målet med den kontaktskapande fasen?",
    answer: "Att gå från <strong>\"okänd\" till \"intressant\"</strong>. Det handlar om att bygga förtroende och skapa förväntningar innan kunden ens gjort sitt första köp."
  },
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Vad är företagsimage?",
    answer: "Den <strong>samlade bilden av företaget utåt</strong>. Det är inte vad företaget säger att det är – utan vad kunden faktiskt känner när de hör företagets namn."
  },
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Vad innebär livscykelansvar?",
    answer: "Att företaget tar ansvar för produkten <strong>hela vägen</strong> – från råvaruuttag och tillverkning till att produkten en dag ska återvinnas. En viktig del av modern hållbar marknadsföring."
  },
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Vad är varumärkesutvidgning?",
    answer: "Att lansera produkter i en <strong>ny produktkategori</strong> under ett redan känt och etablerat varumärke. Exempel: ett sportmärke som börjar sälja kläder under samma namn."
  },
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Vilka tre analysverktyg används för att sätta rätt pris?",
    answer: "<strong>Priskänslighetsanalys</strong> – hur mycket är kunden villig att betala?<br><strong>Konkurrensanalys</strong> – vad kostar liknande produkter hos konkurrenter?<br><strong>Kostnadsanalys</strong> – vad kostar det att producera och distribuera?"
  },
  {
    category: "fas1",
    catLabel: "Fas 1 – Före köp",
    question: "Varför är trovärdighet viktigt i fas 1?",
    answer: "Kunder <strong>litar mer på vad andra kunder säger</strong> än vad företaget säger om sig självt. Att visa kundcase och recensioner bygger förtroende mer effektivt än egen reklam."
  },
  // FAS 2
  {
    category: "fas2",
    catLabel: "Fas 2 – Under köp",
    question: "Vad är skillnaden mellan multichannel och omnichannel?",
    answer: "<strong>Multichannel</strong> = att sälja via många kanaler (butik, webb, sociala medier).<br><strong>Omnichannel</strong> = att alla kanaler <em>fungerar sömlöst ihop</em> – kunden kan börja i en kanal och fortsätta i en annan utan friktion."
  },
  {
    category: "fas2",
    catLabel: "Fas 2 – Under köp",
    question: "Vad menas med sinnesmarknadsföring?",
    answer: "Att stärka kundens köpupplevelse genom att stimulera alla sinnen: <strong>lukt, hörsel, syn, smak och känsel</strong>. Exempel: musik i butik, doften av nybakat eller möjligheten att känna på en produkt."
  },
  {
    category: "fas2",
    catLabel: "Fas 2 – Under köp",
    question: "Vilka fyra säljkanaler nämns i kapitlet?",
    answer: "<strong>Egna butiker</strong> – full kontroll över upplevelsen<br><strong>Återförsäljare</strong> – bred räckvidd<br><strong>E-handel</strong> – öppet dygnet runt<br><strong>Tillfälliga säljställen</strong> – mässor och pop-up"
  },
  {
    category: "fas2",
    catLabel: "Fas 2 – Under köp",
    question: "Vad innebär 'Delight' i kundupplevelsen?",
    answer: "Att ge kunden <strong>något oförväntat positivt</strong> precis vid köpet – ett välkomst-kit, en liten bonus eller personlig uppmärksamhet som skapar en positiv överraskning och stärker relationen."
  },
  {
    category: "fas2",
    catLabel: "Fas 2 – Under köp",
    question: "Varför är 'seamless experience' viktigt vid köpet?",
    answer: "Friktion dödar relationen. En <strong>krånglig kassa, otydlig information eller otrevlig personal</strong> kan förstöra allt förtroende som byggts upp i fas 1 – kunden väljer bort företaget."
  },
  // FAS 3
  {
    category: "fas3",
    catLabel: "Fas 3 – Efter köp",
    question: "Vad är målet med den relationsförstärkande fasen?",
    answer: "Att förvandla en <strong>engångskund till en lojal ambassadör</strong>. Det är också här den verkliga lönsamheten skapas – det kostar mycket mer att skaffa nya kunder än att behålla befintliga."
  },
  {
    category: "fas3",
    catLabel: "Fas 3 – Efter köp",
    question: "Vad är ett CRM-system?",
    answer: "<strong>Customer Relation Management</strong> – ett system för att registrera och använda kundinformation. Gör det möjligt att skicka <strong>personliga erbjudanden</strong> baserade på köpbeteende istället för massreklam."
  },
  {
    category: "fas3",
    catLabel: "Fas 3 – Efter köp",
    question: "Varför kan en välhanterad reklamation göra kunden mer lojal?",
    answer: "Om företaget vänder missnöjet till något positivt – snabb, generös och empatisk hantering – blir kunden ofta <strong>mer lojal än om felet aldrig hade uppstått</strong>. Det visar att företaget verkligen bryr sig."
  },
  {
    category: "fas3",
    catLabel: "Fas 3 – Efter köp",
    question: "Vad är syftet med kundklubbar och bonussystem?",
    answer: "De ger kunden ett <strong>rationellt skäl att komma tillbaka</strong> (rabatter och poäng), men bygger också en känsla av tillhörighet och exklusivitet som stärker relationen på lång sikt."
  },
  {
    category: "fas3",
    catLabel: "Fas 3 – Efter köp",
    question: "Vilket vanligt misstag gör de flesta företag i sin marknadsföring?",
    answer: "De lägger <strong>90% av krutet på fas 1</strong> (att hitta nya kunder). Men det är i <strong>fas 3</strong> – efterköpsfasen – som den verkliga lönsamheten och de trogna fansen skapas."
  }
];

let activeFilter = 'all';
let currentCards = [];
let currentIndex = 0;
let isFlipped = false;
let knownCards = new Set();
let reviewCards = new Set();

function getFilteredCards() {
  if (activeFilter === 'all') return [...ALL_CARDS];
  return ALL_CARDS.filter(c => c.category === activeFilter);
}

function initCards() {
  currentCards = getFilteredCards();
  currentIndex = 0;
  isFlipped = false;
  knownCards.clear();
  reviewCards.clear();
  updateDisplay();
  updateScores();
  document.getElementById('completedPanel').classList.remove('show');
  document.getElementById('cardArea').style.display = 'flex';
}

function updateDisplay() {
  if (currentCards.length === 0) return;
  const card = currentCards[currentIndex];
  const el = document.getElementById('mainCard');

  // Reset flip
  el.classList.remove('flipped');
  isFlipped = false;

  document.getElementById('cardQuestion').innerHTML = card.question;
  document.getElementById('cardAnswer').innerHTML = card.answer;

  const num = `${currentIndex + 1} / ${currentCards.length}`;
  document.getElementById('cardCounter').textContent = num;
  document.getElementById('cardCounterBack').textContent = num;

  const dot = document.getElementById('catDot');
  dot.className = 'cat-dot ' + card.category;
  document.getElementById('catLabel').textContent = card.catLabel;

  updateProgress();
}

function updateProgress() {
  const total = currentCards.length;
  const done = knownCards.size + reviewCards.size;
  const pct = total > 0 ? (done / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} klara`;
}

function updateScores() {
  document.getElementById('knownCount').textContent = knownCards.size;
  document.getElementById('reviewCount').textContent = reviewCards.size;
  document.getElementById('remainingCount').textContent = currentCards.length - knownCards.size - reviewCards.size;
}

function flipCard() {
  const el = document.getElementById('mainCard');
  isFlipped = !isFlipped;
  el.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentCards.length - 1) {
    currentIndex++;
    updateDisplay();
  } else {
    checkCompleted();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    updateDisplay();
  }
}

function markCard(type) {
  const cardId = currentIndex;
  if (type === 'know') {
    knownCards.add(cardId);
    reviewCards.delete(cardId);
  } else {
    reviewCards.add(cardId);
    knownCards.delete(cardId);
  }
  updateScores();
  updateProgress();

  // Brief visual feedback then advance
  setTimeout(() => {
    if (currentIndex < currentCards.length - 1) {
      currentIndex++;
      updateDisplay();
    } else {
      checkCompleted();
    }
  }, 200);
}

function checkCompleted() {
  const allMarked = (knownCards.size + reviewCards.size) >= currentCards.length;
  if (allMarked || currentIndex >= currentCards.length - 1) {
    const known = knownCards.size;
    const total = currentCards.length;
    document.getElementById('completedMsg').textContent =
      `Du kan ${known} av ${total} begrepp! ${known === total ? '🌟 Perfekt resultat!' : 'Fortsätt öva på de röda.'}`;
    document.getElementById('completedPanel').classList.add('show');
    document.getElementById('cardArea').style.display = 'none';
  }
}

function shuffleCards() {
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  currentIndex = 0;
  updateDisplay();
}

function resetAll() {
  initCards();
  document.getElementById('completedPanel').classList.remove('show');
  document.getElementById('cardArea').style.display = 'flex';
}

// Filter tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    initCards();
  });
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'k' || e.key === 'K') markCard('know');
  if (e.key === 'r' || e.key === 'R') markCard('review');
});

// Init
initCards();
</script>
</body>
</html>
